<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCS // ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--panel:#0d0d0d;--inp:#111;--cyan:#00FFE5;--magenta:#FF00A0;--amber:#FFB800;--green:#00FF41;--red:#FF3030;--dim:#444;--text:#aaa;--border:#222}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);z-index:9999;pointer-events:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.blink{animation:blink 1.1s step-end infinite}
.gc{color:var(--cyan);text-shadow:0 0 6px var(--cyan)}
.ga{color:var(--amber);text-shadow:0 0 5px var(--amber)}
.gg{color:var(--green);text-shadow:0 0 5px var(--green)}
.gm{color:var(--magenta)}
.gr{color:var(--red)}
/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
.login-box{border:1px solid var(--cyan);padding:32px 40px;background:var(--panel);min-width:320px;box-shadow:0 0 30px rgba(0,255,229,.08)}
.login-box h1{font-family:'VT323',monospace;font-size:1.6rem;color:var(--cyan);text-shadow:0 0 8px var(--cyan);margin-bottom:4px}
.login-box p{font-size:.7rem;color:var(--dim);margin-bottom:20px}
.inp{width:100%;background:var(--inp);border:1px solid var(--border);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:.9rem;padding:8px 10px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(0,255,229,.15)}
.btn{width:100%;margin-top:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:.9rem;padding:9px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(0,255,229,.08)}
.login-err{font-size:.72rem;color:var(--red);margin-top:8px;min-height:1.2em}
/* MAIN ADMIN */
#app{display:none}
.hdr{padding:10px 24px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.hdr-title{font-family:'VT323',monospace;font-size:1.8rem;color:var(--cyan);text-shadow:0 0 8px var(--cyan);letter-spacing:2px}
.hdr-right{font-size:.7rem;color:var(--dim);text-align:right}
.body{display:grid;grid-template-columns:340px 1fr;gap:0;height:calc(100vh - 52px)}
/* FORM */
.form-panel{border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.form-ph{font-family:'VT323',monospace;font-size:1rem;color:var(--amber);text-shadow:0 0 5px rgba(255,184,0,.2);margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:.68rem;color:var(--dim);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;background:var(--inp);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:6px 8px;outline:none;transition:border-color .2s;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan)}
.field textarea{min-height:72px}
.field select option{background:#111}
.form-btns{display:flex;gap:6px;margin-top:14px}
.fbtn{flex:1;background:transparent;border:1px solid;font-family:'Share Tech Mono',monospace;font-size:.78rem;padding:7px;cursor:pointer;transition:all .2s}
.fbtn-save{border-color:var(--cyan);color:var(--cyan)}.fbtn-save:hover{background:rgba(0,255,229,.08)}
.fbtn-clear{border-color:var(--dim);color:var(--dim)}.fbtn-clear:hover{border-color:var(--text);color:var(--text)}
.form-msg{font-size:.7rem;margin-top:8px;min-height:1.2em}
/* TABLE */
.list-panel{overflow-y:auto;padding:16px}
.list-ph{font-family:'VT323',monospace;font-size:1rem;color:var(--cyan);text-shadow:0 0 5px rgba(0,255,229,.2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.list-ph span{font-size:.7rem;color:var(--dim)}
.search-bar{margin-bottom:8px}
.srch{width:100%;background:var(--inp);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.78rem;padding:5px 8px;outline:none}
.srch:focus{border-color:var(--cyan)}
table{width:100%;border-collapse:collapse;font-size:.74rem}
th{text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--dim);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #0e0e0e;vertical-align:top;line-height:1.35}
tr:hover td{background:#0c0c0c}
.row-selected td{background:#0e1a1a!important}
.cat-need{color:var(--magenta)}.cat-should{color:var(--cyan)}.cat-nice{color:var(--green)}
.s-prog{color:var(--cyan)}.s-plan{color:var(--amber)}.s-comp{color:var(--green)}.s-blk{color:var(--red)}
.act-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.66rem;padding:2px 6px;cursor:pointer;transition:all .15s;margin-right:3px}
.act-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.act-del{border-color:var(--border)}.act-del:hover{border-color:var(--red)!important;color:var(--red)!important}
.task-cell{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div class="scanlines"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>KCS // ADMIN<span class="blink">█</span></h1>
    <p>RESTRICTED ACCESS — AUTHORIZED PERSONNEL ONLY</p>
    <input class="inp" type="password" id="pw" placeholder="Enter admin password" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-title">KCS // PROJECT ADMIN PANEL</div>
    <div class="hdr-right"><span id="task-count">0 TASKS</span> &nbsp;|&nbsp; <a href="/" style="color:var(--dim);text-decoration:none" target="_blank">VIEW ROADMAP ↗</a></div>
  </div>
  <div class="body">
    <!-- FORM -->
    <div class="form-panel">
      <div class="form-ph" id="form-ph">╔══[ ADD TASK ]══╗</div>
      <input type="hidden" id="edit-id">
      <div class="field"><label>Priority (CAT)</label>
        <select id="f-cat">
          <option>Need to Have</option>
          <option>Should Have</option>
          <option>Nice to Have</option>
        </select>
      </div>
      <div class="field"><label>Affected Entity</label><input id="f-entity" type="text" placeholder="e.g. NINJA RMM"></div>
      <div class="field"><label>Task Description</label><textarea id="f-task" placeholder="Full task description..."></textarea></div>
      <div class="field"><label>ETT / Quarter</label>
        <select id="f-ett">
          <option value="">TBD</option>
          <option>Q1 2026</option><option>Q2 2026</option><option>Q3 2026</option><option>Q4 2026</option>
        </select>
      </div>
      <div class="field"><label>Domain / Platform</label><input id="f-platform" type="text" placeholder="e.g. HALO PSA"></div>
      <div class="field"><label>Tags (comma separated)</label><input id="f-tags" type="text" placeholder="ai, billing, rmm"></div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          <option>PLANNED</option><option>IN PROGRESS</option><option>COMPLETE</option><option>BLOCKED</option>
        </select>
      </div>
      <div class="form-btns">
        <button class="fbtn fbtn-save" onclick="save()">► SAVE TASK</button>
        <button class="fbtn fbtn-clear" onclick="clearForm()">✕ CLEAR</button>
      </div>
      <div class="form-msg gc" id="form-msg"></div>
    </div>
    <!-- LIST -->
    <div class="list-panel">
      <div class="list-ph">╔══[ TASK REGISTRY ]══╗ <span id="task-count2">0 tasks</span></div>
      <div class="search-bar"><input class="srch" id="srch" placeholder="Search tasks..." oninput="renderTable()"></div>
      <table>
        <thead><tr>
          <th>CAT</th><th>ENTITY</th><th style="width:40%">TASK</th><th>ETT</th><th>STATUS</th><th>ACTIONS</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let TOKEN='',DATA=[],EDIT_ID=null;
const $=id=>document.getElementById(id);

async function doLogin(){
  const pw=$('pw').value.trim();
  const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(r.ok){TOKEN=pw;$('login').style.display='none';$('app').style.display='';loadTasks();}
  else{$('lerr').textContent='ACCESS DENIED — INVALID CREDENTIALS';}
}
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function loadTasks(){
  const r=await fetch('/api/tasks');DATA=await r.json();renderTable();
  $('task-count').textContent=DATA.length+' TASKS';
}

function renderTable(){
  const q=($('srch').value||'').toLowerCase();
  const rows=DATA.filter(t=>!q||[t.cat,t.entity,t.task,t.platform,t.tags,t.status].some(v=>(v||'').toLowerCase().includes(q)));
  $('task-count2').textContent=rows.length+' tasks';
  const catCls=c=>c==='Need to Have'?'cat-need':c==='Should Have'?'cat-should':'cat-nice';
  const stCls=s=>s==='IN PROGRESS'?'s-prog':s==='COMPLETE'?'s-comp':s==='BLOCKED'?'s-blk':'s-plan';
  $('tbody').innerHTML=rows.map(t=>`<tr id="row-${t.id}" ${EDIT_ID==t.id?'class="row-selected"':''}>
<td class="${catCls(t.cat)}" style="white-space:nowrap;font-size:.68rem">${t.cat==='Need to Have'?'NEED':t.cat==='Should Have'?'SHOULD':'NICE'}</td>
<td style="white-space:nowrap">${esc(t.entity)}</td>
<td class="task-cell" title="${esc(t.task)}">${esc(t.task)}</td>
<td style="white-space:nowrap;font-size:.7rem">${esc(t.ett||'TBD')}</td>
<td class="${stCls(t.status)}" style="white-space:nowrap;font-size:.7rem">${esc(t.status)}</td>
<td style="white-space:nowrap">
  <button class="act-btn" onclick="editTask(${t.id})">EDIT</button>
  <button class="act-btn act-del" onclick="delTask(${t.id})">DEL</button>
</td></tr>`).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function editTask(id){
  const t=DATA.find(x=>x.id===id);if(!t)return;
  EDIT_ID=id;$('edit-id').value=id;
  $('f-cat').value=t.cat;$('f-entity').value=t.entity;$('f-task').value=t.task;
  $('f-ett').value=t.ett||'';$('f-platform').value=t.platform||'';
  $('f-tags').value=t.tags||'';$('f-status').value=t.status||'PLANNED';
  $('form-ph').textContent='╔══[ EDIT TASK #'+id+' ]══╗';
  $('form-msg').textContent='';
  renderTable();
  document.querySelector('.form-panel').scrollTop=0;
}

function clearForm(){
  EDIT_ID=null;$('edit-id').value='';
  ['f-cat','f-entity','f-task','f-ett','f-platform','f-tags','f-status'].forEach(id=>{
    const el=$(id);if(el.tagName==='SELECT'){el.selectedIndex=0;}else{el.value='';}
  });
  $('form-ph').textContent='╔══[ ADD TASK ]══╗';$('form-msg').textContent='';
  renderTable();
}

async function save(){
  const body={
    cat:$('f-cat').value,entity:$('f-entity').value.trim().toUpperCase(),
    task:$('f-task').value.trim(),ett:$('f-ett').value,
    platform:$('f-platform').value.trim(),tags:$('f-tags').value.trim(),
    status:$('f-status').value
  };
  if(!body.entity||!body.task){msg('Entity and Task are required.','var(--red)');return;}
  const url=EDIT_ID?`/api/tasks/${EDIT_ID}`:'/api/tasks';
  const method=EDIT_ID?'PUT':'POST';
  const r=await fetch(url,{method,headers:{'Content-Type':'application/json','x-admin-token':TOKEN},body:JSON.stringify(body)});
  if(r.ok){msg(EDIT_ID?'Task updated.':'Task added.','var(--green)');clearForm();loadTasks();}
  else msg('Save failed.','var(--red)');
}

async function delTask(id){
  if(!confirm('Delete task #'+id+'?'))return;
  const r=await fetch(`/api/tasks/${id}`,{method:'DELETE',headers:{'x-admin-token':TOKEN}});
  if(r.ok){if(EDIT_ID===id)clearForm();loadTasks();}
  else msg('Delete failed.','var(--red)');
}

function msg(text,color){const el=$('form-msg');el.style.color=color;el.textContent=text;setTimeout(()=>{if(el.textContent===text)el.textContent='';},3000);}
</script>
</body>
</html>
